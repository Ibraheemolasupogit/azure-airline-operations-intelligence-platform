name: Quality

"on":
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint and format check
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Test
        run: make test

      - name: Documentation check
        run: make docs-check

      - name: YAML check
        run: make yaml-check

      - name: Validate repository
        run: make validate

      - name: Generate CI synthetic data
        run: make generate-data-ci
